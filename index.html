<!DOCTYPE html>
<html lang="ur" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>اردو قاعدہ - مکمل ورک بک</title>

    <link
        href="https://fonts.googleapis.com/css2?family=Noto+Nastaliq+Urdu:wght@400;700&family=Noto+Sans+Arabic:wght@100;300&display=swap"
        rel="stylesheet">

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            background: #f2f2f2;
            font-family: 'Noto Nastaliq Urdu', serif;
        }

        .page {
            width: 210mm;
            min-height: 297mm;
            background: white;
            margin: 10px auto;
            padding: 15mm;
            page-break-after: always;
            border: 1px solid #ddd;
            position: relative;
            overflow: hidden;
        }

        /* Watermark style */
        .page::before {
            content: "www.aiocrafters.com";
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) rotate(-30deg);
            font-size: 50px;
            font-family: 'Noto Sans Arabic', sans-serif;
            font-weight: bold;
            color: rgba(148, 163, 184, 0.05);
            /* Very subtle slate-gray */
            white-space: nowrap;
            pointer-events: none;
            z-index: 10;
        }

        .page.cover::before {
            display: none;
            /* No watermark on cover page */
        }

        .cover {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 260mm;
        }

        .cover-website {
            margin-top: 40px;
            font-size: 16px;
            color: #64748b;
            font-family: 'Noto Sans Arabic', sans-serif;
            font-weight: 300;
            letter-spacing: 1px;
            border-top: 1px solid #e2e8f0;
            padding-top: 15px;
            width: 240px;
            text-align: center;
            line-height: 1.5;
        }

        .cover h1 {
            font-size: 70px;
        }

        .cover h2 {
            font-size: 32px;
        }

        .header {
            text-align: center;
            font-size: 24px;
            margin-bottom: 20px;
            border: 2px solid #ccc;
            border-radius: 12px;
            padding: 10px;
        }

        .letter-row {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
            gap: 20px;
            margin-bottom: 25px;
            border: 2px solid #e2e8f0;
            border-radius: 16px;
            padding: 15px 30px;
            background: #f8fafc;
        }

        .col-right {
            text-align: right;
            font-size: 90px;
            line-height: 1.4;
            font-weight: bold;
            color: #1e293b;
            padding-right: 20px;
        }

        .col-center {
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .col-center img {
            width: 180px;
            height: 180px;
            object-fit: contain;
            border: 2px solid #cbd5e1;
            border-radius: 12px;
            padding: 8px;
            background: white;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.05);
        }

        .col-left {
            text-align: left;
            font-size: 56px;
            font-weight: bold;
            color: #1e293b;
        }

        .trace-boxes {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 12px;
            margin-bottom: 20px;
            align-items: start;
        }

        .trace-box {
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            aspect-ratio: 1 / 1;
            width: 100%;
            height: auto;
            display: flex;
            align-items: center;
            justify-content: center;
            background: white;
            direction: ltr;
        }

        .trace-box svg,
        .stroke-box svg {
            width: 100%;
            height: 100%;
            display: block;
            overflow: visible;
        }

        .trace-box svg text {
            font-family: 'Noto Sans Arabic', sans-serif;
            font-weight: 100;
            font-size: 45px;
            fill: none;
            stroke: #a3a3a3;
            stroke-width: 2px;
            stroke-dasharray: 4 5;
            stroke-linecap: round;
            text-anchor: middle;
            dominant-baseline: central;
            direction: ltr;
            unicode-bidi: bidi-override;
        }

        .section-title {
            font-size: 20px;
            font-weight: bold;
            color: #334155;
            margin-top: 15px;
            margin-bottom: 10px;
            border-right: 4px solid #94a3b8;
            padding-right: 8px;
        }

        .practice-title {
            text-align: center;
            font-size: 22px;
            margin: 20px 0;
        }

        .practice-line {
            height: 60px;
            border-bottom: 2px solid #aaa;
            margin-bottom: 15px;
        }

        .stroke-boxes {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 12px;
            margin-top: 20px;
            align-items: start;
        }

        .stroke-box {
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            aspect-ratio: 1 / 1;
            width: 100%;
            height: auto;
            display: flex;
            align-items: center;
            justify-content: center;
            background: white;
            direction: ltr;
        }

        .stroke-box svg text {
            font-family: 'Noto Sans Arabic', sans-serif;
            font-weight: 300;
            font-size: 45px;
            fill: #d1d5db;
            text-anchor: middle;
            dominant-baseline: central;
            direction: ltr;
            unicode-bidi: bidi-override;
        }

        .footer {
            display: flex;
            justify-content: space-between;
            margin-top: 20px;
            color: #94a3b8;
            font-size: 14px;
            font-family: 'Noto Sans Arabic', sans-serif;
            border-top: 1px solid #f1f5f9;
            padding-top: 10px;
            direction: rtl;
        }

        @media print {

            body {
                background: white;
            }

            .page {
                margin: 0;
                border: none;
            }

        }
    </style>
</head>

<body>

    <div class="page cover">
        <h1>اردو قاعدہ</h1>
        <h2>حروفِ تہجی مشق کتاب</h2>
        <h3>الف سے ے تک</h3>
        <div class="cover-website">
            <span style="font-weight: 600; font-size: 22px; color: #1e293b; display: block; margin-bottom: 4px;">Aio
                Crafters</span>
            www.aiocrafters.com
        </div>
    </div>

    <div id="book"></div>

    <script>

        const letters = [

            { letter: "ا", word: "انار", image: "images/alif-anar.png" },
            { letter: "ب", word: "بکری", image: "images/bay-bakri.png" },
            { letter: "پ", word: "پتنگ", image: "images/pay-patang.png" },
            { letter: "ت", word: "تتلی", image: "images/tay-titli.png" },
            { letter: "ٹ", word: "ٹماٹر", image: "images/ttay-tamatar.png" },
            { letter: "ث", word: "ثواب", image: "images/say-sawab.png" },
            { letter: "ج", word: "جہاز", image: "images/jeem-jahaz.png" },
            { letter: "چ", word: "چڑیا", image: "images/chay-chiria.png" },
            { letter: "ح", word: "حلوہ", image: "images/hay-halwa.png" },
            { letter: "خ", word: "خرگوش", image: "images/khay-rabbit.png" },
            { letter: "د", word: "درخت", image: "images/daal-tree.png" },
            { letter: "ڈ", word: "ڈبہ", image: "images/ddaal-box.png" },
            { letter: "ذ", word: "ذرا", image: "images/za.png" },
            { letter: "ر", word: "رنگ", image: "images/ray-rang.png" },
            { letter: "ڑ", word: "گاڑی", image: "images/rray-car.png" },
            { letter: "ز", word: "زمین", image: "images/zay-earth.png" },
            { letter: "ژ", word: "ژالہ", image: "images/zhay-dew.png" },
            { letter: "س", word: "سیب", image: "images/seen-apple.png" },
            { letter: "ش", word: "شیر", image: "images/sheen-lion.png" },
            { letter: "ص", word: "صابن", image: "images/suad-soap.png" },
            { letter: "ض", word: "ضیافت", image: "images/zuad-feast.png" },
            { letter: "ط", word: "طوطا", image: "images/toay-parrot.png" },
            { letter: "ظ", word: "ظرف", image: "images/zoay-bowl.png" },
            { letter: "ع", word: "عینک", image: "images/ain-glasses.png" },
            { letter: "غ", word: "غبارہ", image: "images/ghain-balloon.png" },
            { letter: "ف", word: "فوارہ", image: "images/fay-fawwara.png" },
            { letter: "ق", word: "قلم", image: "images/qaaf-pen.png" },
            { letter: "ک", word: "کتاب", image: "images/kaaf-book.png" },
            { letter: "گ", word: "گلاب", image: "images/gaaf-rose.png" },
            { letter: "ل", word: "لیموں", image: "images/laam-lemon.png" },
            { letter: "م", word: "مچھلی", image: "images/meem-fish.png" },
            { letter: "ن", word: "نارنگی", image: "images/noon-orange.png" },
            { letter: "و", word: "ورزش", image: "images/wow-warzish.png" },
            { letter: "ہ", word: "ہاتھی", image: "images/hay-elephant.png" },
            { letter: "ء", word: "ہمزہ", image: "images/hamza.png" },
            { letter: "ی", word: "یاقوت", image: "images/yay-ruby.png" },
            { letter: "ے", word: "بڑی ے", image: "images/bariyay.png" }

        ];

        const container = document.getElementById('book');

        letters.forEach(item => {

            let tracingBoxes = "";

            for (let i = 0; i < 2; i++) {
                tracingBoxes += `<div class="trace-boxes">`;
                for (let j = 0; j < 7; j++) {
                    tracingBoxes += `<div class="trace-box"><svg viewBox="0 0 100 100"><text x="50%" y="48%" direction="ltr" unicode-bidi="bidi-override">${item.letter}</text></svg></div>`;
                }
                tracingBoxes += `</div>`;
            }

            let strokeBoxes = "";

            for (let i = 0; i < 21; i++) {

                strokeBoxes += `
<div class="stroke-box"><svg viewBox="0 0 100 100"><text x="50%" y="48%" direction="ltr" unicode-bidi="bidi-override">${item.letter}</text></svg></div>
`;

            }

            container.innerHTML += `

<div class="page">

    <div class="header">
        لکھائی کی بنیادی مشقیں
    </div>

    <div class="letter-row">
        <div class="col-right">
            ${item.letter}
        </div>
        <div class="col-center">
            <img src="${item.image}"
                 alt="${item.word}"
                 onerror="this.onerror=null; this.src='https://via.placeholder.com/220?text=${encodeURIComponent(item.word)}';">
        </div>
        <div class="col-left">
            ${item.word}
        </div>
    </div>

    <div class="section-title">حرف ٹریس کریں</div>
    ${tracingBoxes}

    <div class="section-title">باکس میں لکھیں</div>
    <div class="stroke-boxes">
        ${strokeBoxes}
    </div>

    <div class="practice-title">
        آزادانہ مشق
    </div>

    <div class="practice-line"></div>
    <div class="practice-line"></div>
    <div class="practice-line"></div>
    <div class="practice-line"></div>
    <div class="practice-line"></div>
    <div class="practice-line"></div>
    <div class="practice-line"></div>
    <div class="practice-line"></div>
    <div class="practice-line"></div>
    <div class="practice-line"></div>

    <div class="footer">
        <span>حرف ${item.letter}</span>
        <span>www.aiocrafters.com</span>
    </div>

</div>

`;

        });

    </script>

</body>

</html>
